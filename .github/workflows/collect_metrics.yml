name: Collect performance review metrics

on:
  workflow_dispatch:
    inputs:
      window:
        description: Review window to collect
        required: true
        default: weekly
        type: choice
        options:
          - daily
          - weekly
          - monthly
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  collect-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Generate reports
        env:
          PERFORMANCE_REVIEW_GITHUB_TOKEN: ${{ secrets.PERFORMANCE_REVIEW_GITHUB_TOKEN }}
          WINDOW: ${{ github.event_name == 'workflow_dispatch' && inputs.window || 'weekly' }}
        run: python scripts/collect_metrics.py --window "$WINDOW"

      - name: Commit report changes
        run: |
          if git status --porcelain reports | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add reports
            git commit -m "Update performance review reports"
            git push
          else
            echo "No report changes to commit"
          fi